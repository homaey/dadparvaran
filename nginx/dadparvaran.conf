# ==========================================================
# Dadparvaran — Canonical domain: https://www.dadparvaran.com
# ==========================================================
# ریدایرکت یکمرحله‌ای 301 از تمام نسخه‌های غیرمرجع دامنه
# به نسخه‌ی نهایی HTTPS + www
# ==========================================================

# 1) HTTP (هر دو www و بدون www) → HTTPS www  (301 تکی، بدون زنجیره)
server {
    listen 80;
    listen [::]:80;
    server_name dadparvaran.com www.dadparvaran.com;
    return 301 https://www.dadparvaran.com$request_uri;
}

# 2) HTTPS بدون www → HTTPS www  (301 تکی)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dadparvaran.com;

    ssl_certificate     /etc/letsencrypt/live/dadparvaran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dadparvaran.com/privkey.pem;

    return 301 https://www.dadparvaran.com$request_uri;
}

# 3) سرور اصلی — HTTPS www (نسخه مرجع)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dadparvaran.com;

    ssl_certificate     /etc/letsencrypt/live/dadparvaran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dadparvaran.com/privkey.pem;

    # HSTS — مرورگرها فقط HTTPS استفاده کنند
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # پراکسی به Next.js (pm2)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # فایل‌های استاتیک Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # فایل‌های public
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot|css|js|json|xml|txt)$ {
        proxy_pass http://127.0.0.1:3001;
        expires 30d;
        add_header Cache-Control "public";
    }
}
