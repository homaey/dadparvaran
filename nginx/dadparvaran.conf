# ==========================================================
# Dadparvaran — Canonical domain: https://www.dadparvaran.com
# ==========================================================

# 1) HTTP → HTTPS www  (301 یکمرحله‌ای)
server {
    listen 80;
    listen [::]:80;
    server_name dadparvaran.com www.dadparvaran.com;
    return 301 https://www.dadparvaran.com$request_uri;
}

# 2) HTTPS بدون www → HTTPS www  (301 یکمرحله‌ای)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dadparvaran.com;

    ssl_certificate /etc/letsencrypt/live/dadparvaran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dadparvaran.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.dadparvaran.com$request_uri;
}

# 3) سرور اصلی — HTTPS www (نسخه مرجع)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dadparvaran.com;

    ssl_certificate /etc/letsencrypt/live/dadparvaran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dadparvaran.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot|css|js|json|xml|txt)$ {
        proxy_pass http://127.0.0.1:3001;
        expires 30d;
        add_header Cache-Control "public";
    }
}
